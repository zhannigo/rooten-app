<!DOCTYPE html>
<html lang="ru">
    <head>
        <meta charset="UTF-8" />
        <title> Rooten app </title>
        <link rel="stylesheet" href="style.css"/>
    </head>
<body>
    <h1>Сегодня</h1>

    <ul id="taskList"></ul>
    <script src="script.js"></script>

</html>
